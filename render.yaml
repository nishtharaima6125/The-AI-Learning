services:
  # Static site for the React/Vite frontend
  - type: web
    name: youware-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Serve static assets normally
      - route: /assets/*
        path: /assets/:splat
      - route: /favicon.ico
        path: /favicon.ico
      # Handle client-side routing - redirect all other routes to index.html
      - route: /**/*
        path: /index.html
    envVars:
      # Force npm usage and prevent pnpm
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PREFER_OFFLINE
        value: "true"
      - key: NPM_CONFIG_AUDIT
        value: "false"
      - key: NPM_CONFIG_FUND
        value: "false"
      # Explicitly disable pnpm
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
